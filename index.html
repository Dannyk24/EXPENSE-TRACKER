<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXPENSE TRACKER WEB APP</title>

    <!--EXTERNAL STYLESHEETS(flatpickr library)-->
    <link rel="stylesheet" href="CSS/IMPORTED/flatpickr.min.css">
    <link rel="stylesheet" href="CSS/IMPORTED/flatpickr_dark.css">

    <!--EXTERNAL STYLESHEETS(Google fonts cdn link)-->
    <!---Monteserrat(Primary font)-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <!---inter(Secondary font)-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..  900&display=swap" rel="stylesheet">


    <!--LOCAL STYLESHEETS-->
    <link rel="stylesheet" href="CSS/GLOBAL/style.css">
    <link rel="stylesheet" href="ASSETS/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="CSS/CUSTOM/dashboard.css">
    <link rel="stylesheet" href="CSS/CUSTOM/transactions.css">
    <link rel="stylesheet" href="CSS/CUSTOM/budgets.css">
    <link rel="stylesheet" href="CSS/CUSTOM/settings.css">
    <link rel="stylesheet" href="CSS/CUSTOM/profile.css">
</head>

<body>
    <aside>
        <div class="logo-container">
            <div class="left-hand-side"><i class="logo fas fa-wallet"></i></div>
            <div class="right-hand-side">
                <div class="app-name">ExpensePro</div>
                <div class="account-status">Base Account</div>
            </div>
        </div>
        <div class="navigation-panel">
            <nav>
                <div class="nav-item-container active-nav-item">
                    <i class="fas fa-chart-line"></i>
                    <span>Dashboard</span>
                </div>
                <div class="nav-item-container">
                    <i class="fas fa-receipt"></i>
                    <span>Transactions</span>
                </div>
                <div class="nav-item-container">
                    <i class="fas fa-circle-notch"></i>
                    <span>Budget</span>
                </div>
                <div class="nav-item-container">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </div>
                <div class="nav-item-container">
                    <i class="fas fa-user"></i>
                    <span>Profile</span>
                </div>
            </nav>
            <div class="dashboard-user-profile-container">
                <div class="line"></div>
                <div class="bottom-section">
                    <div class="profile-picture">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="user-info">
                        <p class="username">John Doe</p>
                        <div class="user-email">john@example.com</div>
                    </div>
                    <div class="navigation">
                        <i class="fas fa-ellipsis-v"></i>
                    </div>
                </div>
            </div>
        </div>
    </aside>
    
    <main>
        <section data-section="dashboard"></section>

        <section data-section="transactions"></section>

        <section data-section="budgets"></section>

        <section data-section="settings"></section>

        <section data-section="profile"></section>
    </main>







    <!--EXTERNAL SCRIPTS-->
    <!--FLATPICKR LIBRARY-->
    <script src="SCRIPTS/IMPORTED/flatpickr.min.js"></script>
    <!--CHART.JS LIBRARY-->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!--LOCAL SCRIPTS-->
    <script type="module" src="SCRIPTS/CUSTOM/script.js"></script>
</body>
</html>
